services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    container_name: postgres_bycoders
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bycoders
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
    driver: local